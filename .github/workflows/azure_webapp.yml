name: Build and deploy Smart Retail API to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  STARTUP_COMMAND: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker backend.main:app --bind=0.0.0.0:8000"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI import
        env:
          APP_ENV: production
        run: python -c "from backend.main import app; print(f'Validated {app.title}')"

      - name: Create deployment package
        run: |
          zip -r release.zip . \
            -x "venv/*" \
            -x ".venv/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x "*/__pycache__/*" \
            -x "__pycache__/*" \
            -x ".env" \
            -x "*.pyc" \
            -x "data/raw/*" \
            -x "data/staged/*" \
            -x "data/staged_fixed/*" \
            -x "logs*/*" \
            -x "logs*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
          startup-command: ${{ env.STARTUP_COMMAND }}
